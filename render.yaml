services:
  - type: web
    name: sincerely-api
    runtime: node
    # Render auto-detects Node version from .nvmrc / engines field; pin here too.
    buildCommand: npm install --include=dev && npm run build --workspace=shared && npm run build --workspace=server
    # Run node directly (not via `npm run start`) and `exec` so SIGTERM from
    # Render reaches Node itself — this lets the graceful-shutdown handler drain
    # workers cleanly on deploy and avoids the noisy "npm error signal SIGTERM".
    startCommand: cd server && exec node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PORT
        value: 3001
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          name: sincerely-redis
          type: redis
          property: connectionString
      - key: API_BASE_URL
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: TRACKING_BASE_URL
        sync: false
      - key: TRACKING_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      # Set in the Render dashboard (sync:false keeps them out of the blueprint
      # but documents that the service needs them so a re-apply can't drop them).
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SMTP_RELAY_URL
        sync: false
      - key: SMTP_RELAY_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

  - type: redis
    name: sincerely-redis
    plan: free
    # noeviction is Render's recommended policy for job queues: when memory is
    # full it rejects new writes (surfacing an error) rather than silently
    # evicting queued email jobs, which allkeys-lru would do.
    maxmemoryPolicy: noeviction
